{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 520px;">
  <h2 class="mb-4">Cadastrar usuário</h2>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-success" role="alert">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% if erro %}
    <div class="alert alert-danger" role="alert">{{ erro }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('admin_usuarios.novo_submit') }}">
    <div class="mb-3">
      <label for="nome" class="form-label">Nome</label>
      <input
        type="text"
        class="form-control"
        id="nome"
        name="nome"
        value="{{ nome or '' }}"
        required
      >
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">E-mail</label>
      <input
        type="text"
        class="form-control"
        id="email"
        name="email"
        value="{{ email or '' }}"
        required
      >
    </div>

    <div class="mb-3">
      <label for="telefone" class="form-label">Telefone (somente dígitos)</label>
      <input
        type="text"
        class="form-control"
        id="telefone"
        name="telefone"
        value="{{ telefone or '' }}"
        required
      >
    </div>

    <div class="mb-3">
      <label for="senha" class="form-label">Senha</label>
      <input
        type="password"
        class="form-control"
        id="senha"
        name="senha"
      >
    </div>

    <button type="submit" class="btn btn-primary">Cadastrar</button>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary ms-2">Cancelar</a>
  </form>
</div>
{% endblock %}
