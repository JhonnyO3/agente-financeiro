<!-- 6. Gastos fixos (RF-03 / RF-04) -->
<div class="row mb-4">
  <div class="col-12">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5 class="mb-0">
        Gastos fixos
        <span class="fs-6 fw-normal text-muted ms-2">Total mensal: <span id="gastos-fixos-total">—</span></span>
      </h5>
      <button type="button" id="btn-novo-gasto-fixo" class="btn btn-primary btn-sm">+ Novo gasto fixo</button>
    </div>
    <div id="gastos-fixos-container" class="row g-3"></div>
    <p id="gastos-fixos-vazio" class="text-muted d-none">Nenhum gasto fixo cadastrado</p>
  </div>
</div>

<!-- Modal gasto fixo (incluir / editar) -->
<div class="modal fade" id="modal-gasto-fixo" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Gasto fixo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="gf-id">
        <div id="gf-erro" class="text-danger mb-2"></div>
        <div class="mb-3">
          <label for="gf-descricao" class="form-label">Descrição</label>
          <input type="text" class="form-control" id="gf-descricao">
        </div>
        <div class="mb-3">
          <label for="gf-valor" class="form-label">Valor</label>
          <input type="text" class="form-control" id="gf-valor" inputmode="decimal">
        </div>
        <div class="mb-3">
          <label for="gf-data" class="form-label">Data de vencimento</label>
          <input type="date" class="form-control" id="gf-data">
        </div>
        <div class="mb-3">
          <label for="gf-categoria" class="form-label">Categoria</label>
          <select class="form-select" id="gf-categoria">
            {% for categoria in categorias %}
            <option value="{{ categoria }}"{% if categoria == "GASTOS_FIXOS" %} selected{% endif %}>{{ categoria }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label for="gf-forma-pagamento" class="form-label">Forma de pagamento</label>
          <select class="form-select" id="gf-forma-pagamento">
            <option value="CARTAO_CREDITO">CARTAO_CREDITO</option>
            <option value="CARTAO_DEBITO">CARTAO_DEBITO</option>
            <option value="PIX" selected>PIX</option>
            <option value="BOLETO">BOLETO</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="gf-responsavel" class="form-label">Responsável</label>
          <input type="text" class="form-control" id="gf-responsavel">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btn-salvar-gasto-fixo">Salvar</button>
      </div>
    </div>
  </div>
</div>
